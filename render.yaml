# Render Blueprint — DIBMS Backend
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: dibms-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./dibms.db
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.9"
